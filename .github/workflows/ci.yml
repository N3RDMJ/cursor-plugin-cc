name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: lint + typecheck + build + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Biome (lint + format)
        run: npm run check

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Unit + CLI tests
        run: npm test
        env:
          # Ensure live integration tests in tests/integration/ stay skipped on
          # PR runs even if a fork accidentally exports a CURSOR_API_KEY.
          CURSOR_API_KEY: ""

  integration:
    name: live SDK integration
    needs: check
    runs-on: ubuntu-latest
    # Only on main pushes, and only if the secret is configured. Forks don't
    # get the secret, so this job no-ops harmlessly there.
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run live integration tests
        run: npx vitest run tests/integration/
        env:
          CURSOR_API_KEY: ${{ secrets.CURSOR_API_KEY }}
