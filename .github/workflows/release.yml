name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  validate:
    name: lint + typecheck + build + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Biome (lint + format)
        run: npm run check

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Unit + CLI tests
        run: npm test
        env:
          CURSOR_API_KEY: ""

  release:
    name: GitHub Release
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Validate plugin version matches tag
        run: |
          node -e '
            const fs = require("fs");
            const tagVersion = process.env.GITHUB_REF_NAME.replace(/^v/, "");
            const manifest = JSON.parse(fs.readFileSync("plugins/cursor/.claude-plugin/plugin.json", "utf8"));
            if (manifest.version !== tagVersion) {
              console.error(`plugin.json version ${manifest.version} does not match tag ${tagVersion}`);
              process.exit(1);
            }
          '

      - name: Generate release notes
        id: notes
        run: |
          # Get the previous tag (if any)
          PREV_TAG=$(git tag --sort=-v:refname | sed -n '2p')
          if [ -n "$PREV_TAG" ]; then
            echo "prev_tag=$PREV_TAG" >> "$GITHUB_OUTPUT"
            RANGE="$PREV_TAG..HEAD"
          else
            RANGE="HEAD"
          fi

          CHANGELOG_BODY="$(
            awk -v version="${{ steps.version.outputs.version }}" '
              $0 ~ "^## v" version "([[:space:]-]|$)" { capture=1; next }
              capture && /^## / { exit }
              capture { print }
            ' CHANGELOG.md | sed '/./,$!d'
          )"

          {
            echo 'body<<RELEASE_EOF'
            if [ -n "$CHANGELOG_BODY" ]; then
              printf '%s\n\n' "$CHANGELOG_BODY"
            else
              echo "## What's Changed"
              echo ""
              git log "$RANGE" --pretty=format:"- %s (%h)" --no-merges
              echo ""
              echo ""
            fi
            echo "**Full changelog**: https://github.com/${{ github.repository }}/compare/${PREV_TAG:-$(git rev-list --max-parents=0 HEAD | head -1)}...${{ github.ref_name }}"
            echo 'RELEASE_EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: v${{ steps.version.outputs.version }}
          body: ${{ steps.notes.outputs.body }}
          generate_release_notes: false
